name: yte_for_aa_nyte
description: "A new Flutter project."
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.11.1

dependencies:
  # camera: 0.10.5+9
  flutter:
    sdk: flutter
  pedometer: 4.1.0
  permission_handler: ^11.3.1
  http: ^1.6.0
  image_picker: 1.1.2
  intl: ^0.20.2
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.3
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_local_notifications: 18.0.1
  shared_preferences: 2.5.2
  audioplayers: 5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: 0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/sounds/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0B215E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
